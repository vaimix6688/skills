# =============================================================================
# Local Development Infrastructure
# Customize service names, ports, and volumes for your project
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Main relational database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: myproject-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: myproject
      POSTGRES_PASSWORD: myproject_dev
      POSTGRES_DB: myproject
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myproject-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myproject -d myproject"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.myproject.project: "myproject"
      com.myproject.service: "postgres"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # TimescaleDB (PG16) — Event time-series database
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: myproject-timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: myproject
      POSTGRES_PASSWORD: myproject_dev
      POSTGRES_DB: myproject_events
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - myproject-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myproject -d myproject_events"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      com.myproject.project: "myproject"
      com.myproject.service: "timescaledb"
    restart: unless-stopped
    command: >
      postgres
        -c shared_preload_libraries=timescaledb
        -c timescaledb.telemetry_level=off

  # ---------------------------------------------------------------------------
  # Redis 7 — Cache & session store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: myproject-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - myproject-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      com.myproject.project: "myproject"
      com.myproject.service: "redis"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Zookeeper — Kafka dependency
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: myproject-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - myproject-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.myproject.project: "myproject"
      com.myproject.service: "zookeeper"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka 3.7 — Event streaming platform
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: myproject-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - myproject-network
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      com.myproject.project: "myproject"
      com.myproject.service: "kafka"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # NATS 2.10 — Lightweight pub/sub with JetStream
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: myproject-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - myproject-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      com.myproject.project: "myproject"
      com.myproject.service: "nats"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # EMQ X 5 — MQTT broker for IoT devices
  # ---------------------------------------------------------------------------
  emqx:
    image: emqx/emqx:5-elixir
    container_name: myproject-emqx
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_NAME: myproject-emqx
      EMQX_LOADED_PLUGINS: "emqx_dashboard"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - myproject-network
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      com.myproject.project: "myproject"
      com.myproject.service: "emqx"
    restart: unless-stopped

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  postgres_data:
    name: myproject_postgres_data
  timescaledb_data:
    name: myproject_timescaledb_data
  redis_data:
    name: myproject_redis_data
  zookeeper_data:
    name: myproject_zookeeper_data
  zookeeper_log:
    name: myproject_zookeeper_log
  kafka_data:
    name: myproject_kafka_data
  nats_data:
    name: myproject_nats_data
  emqx_data:
    name: myproject_emqx_data
  emqx_log:
    name: myproject_emqx_log

# =============================================================================
# Shared network
# =============================================================================
networks:
  myproject-network:
    name: myproject-network
    driver: bridge
