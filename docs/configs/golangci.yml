run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosec
    - gocritic
    - gofmt
    - goimports
    - errorlint
    - exhaustive

linters-settings:
  govet:
    enable-all: true
  errcheck:
    check-type-assertions: true
    check-blank: true
  gosec:
    severity: error
    confidence: medium
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  exhaustive:
    default-signifies-exhaustive: true
  goimports:
    local-prefixes: github.com/myproject

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: ".*_generated\\.go"
      linters:
        - govet
        - errcheck
        - staticcheck
        - gosec
        - gocritic
        - gofmt
        - goimports
        - errorlint
        - exhaustive

severity:
  default-severity: warning
  rules:
    - linters:
        - gosec
      severity: error
